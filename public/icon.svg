<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#6c3beb"/>
  <!-- top-left dot grid (3×3 mini table hint) -->
  <circle cx="152" cy="152" r="28" fill="rgba(255,255,255,0.25)"/>
  <circle cx="256" cy="152" r="28" fill="rgba(255,255,255,0.25)"/>
  <circle cx="360" cy="152" r="28" fill="rgba(255,255,255,0.25)"/>
  <circle cx="152" cy="256" r="28" fill="rgba(255,255,255,0.25)"/>
  <circle cx="360" cy="256" r="28" fill="rgba(255,255,255,0.25)"/>
  <circle cx="152" cy="360" r="28" fill="rgba(255,255,255,0.25)"/>
  <circle cx="256" cy="360" r="28" fill="rgba(255,255,255,0.25)"/>
  <circle cx="360" cy="360" r="28" fill="rgba(255,255,255,0.25)"/>
  <!-- central × -->
  <text
    x="256" y="310"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="240"
    font-weight="900"
    fill="white"
